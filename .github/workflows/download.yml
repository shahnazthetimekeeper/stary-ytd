name: Download YouTube Video
on:
  workflow_dispatch:
    inputs:
      url:
        description: 'YouTube video URL'
        required: true
        type: string

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Setup yt-dlp
        uses: AnimMouse/setup-yt-dlp@v3

      - name: Decode and decompress cookies
        run: |
          echo "${{ secrets.YOUR_COOKIES }}" | base64 -d | gunzip > cookies.txt

      - name: Download video
        run: |
          yt-dlp --cookies cookies.txt "${{ inputs.url }}" -o "video.%(ext)s"

      - name: Upload video as artifact
        uses: actions/upload-artifact@v4
        with:
          name: downloaded-video
          path: video.*
