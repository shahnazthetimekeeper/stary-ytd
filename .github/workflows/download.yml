name: starry-dl
on:
  workflow_dispatch:
    inputs:
      url:
        description: 'YouTube video URL'
        required: true
        type: string

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup yt-dlp
        uses: AnimMouse/setup-yt-dlp@v3

      - name: Decode and decompress cookies
        run: |
          echo "${{ secrets.YOUR_COOKIES }}" | base64 -d | gunzip > cookies.txt

      - name: Create videos folder
        run: |
          mkdir -p videos

      - name: Download video to videos folder
        run: |
          yt-dlp --cookies cookies.txt "${{ inputs.url }}" \
            -o "videos/%(title)s_%(upload_date)s.%(ext)s"

      - name: Commit and push video
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add videos/
          git commit -m "Add video from ${{ inputs.url }}" || echo "No changes to commit"
          git push
