name: starry-dl-audio
on:
  workflow_dispatch:
    inputs:
      url:
        description: 'YouTube video URL'
        required: true
        type: string

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup yt-dlp
        uses: AnimMouse/setup-yt-dlp@v3

      - name: Decode and decompress cookies
        run: |
          echo "${{ secrets.YOUR_COOKIES }}" | base64 -d | gunzip > cookies.txt

      - name: Keep only last 10 audio files
        run: |
          mkdir -p music
          cd music
          # Delete all but the 10 most recent files
          ls -t *.mp3 *.m4a *.opus 2>/dev/null | tail -n +11 | xargs -r rm

      - name: Download audio and handle splitting
        run: |
          mkdir -p music
          cd music
          
          # Download audio
          yt-dlp --cookies ../cookies.txt "${{ inputs.url }}" \
            -x --audio-format best \
            --audio-quality 0 \
            -o "%(title)s_%(upload_date)s.%(ext)s"
          
          # Wait a moment for file to be fully written
          sleep 2
          
          # Find the downloaded audio file
          AUDIO_FILE=$(ls *.opus *.m4a *.mp3 2>/dev/null | head -n 1)
          echo "Downloaded: $AUDIO_FILE"
          
          # Check if file is larger than 100MB and split if needed
          if [ -f "$AUDIO_FILE" ]; then
            FILE_SIZE=$(stat -c%s "$AUDIO_FILE" 2>/dev/null || stat -f%z "$AUDIO_FILE" 2>/dev/null)
            if [ "$FILE_SIZE" -gt 100000000 ]; then
              echo "File is $FILE_SIZE bytes, splitting into 95MB chunks..."
              split -b 95m "$AUDIO_FILE" "chunk_"
              echo '#!/bin/bash' > reassemble.sh
              echo "cat chunk_* > reassembled_$AUDIO_FILE" >> reassemble.sh
              chmod +x reassemble.sh
              rm "$AUDIO_FILE"
              echo "Original file removed, chunks created"
            else
              echo "File under 100MB ($FILE_SIZE bytes), no split needed"
            fi
          else
            echo "ERROR: No audio file found!"
            exit 1
          fi

      - name: Commit and push audio
        run: |
          git config user.name "GitHub Actions"
          git config.user.email "github-actions@users.noreply.github.com"
          git add music/
          git commit -m "Add audio from ${{ inputs.url }}" || echo "No changes to commit"
          git push

      - name: Upload audio as artifact (backup)
        uses: actions/upload-artifact@v4
        with:
          name: audio-file
          path: music/
          retention-days: 7
