name: Try Without Cookies
on:
  workflow_dispatch:
    inputs:
      url:
        description: 'YouTube video URL'
        required: true

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - uses: AnimMouse/setup-yt-dlp@v3
      - name: Try download
        run: |
          yt-dlp --no-check-certificate \
                 --user-agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64)" \
                 "${{ inputs.url }}" \
                 -o "video.%(ext)s" || echo "Failed - need cookies"
      - uses: actions/upload-artifact@v4
        with:
          name: result
          path: video.*
